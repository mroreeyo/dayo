name: Deploy API
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'prisma/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2
      
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      
      - name: Build & push API image
        run: |
          docker build -t ${{ secrets.ECR_REPO_API }}:${{ github.sha }} -f apps/api/Dockerfile .
          docker push ${{ secrets.ECR_REPO_API }}:${{ github.sha }}
      
      - name: Run database migration
        run: |
          aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --task-definition ${{ secrets.MIGRATE_TASK_DEF }} \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNETS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUPS }}]}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npx","prisma","migrate","deploy"]}]}' \
            --launch-type FARGATE
      
      - name: Update ECS API service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_API }} \
            --force-new-deployment
